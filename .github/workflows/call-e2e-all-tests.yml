name: Lexical e2e tests

on:
  workflow_call:

permissions: {}

jobs:
  # Prime playwright browser caches once per OS so parallel test jobs
  # don't all download browsers simultaneously
  setup-playwright:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 24.x
          - os: macos-latest
            node-version: 24.x
          - os: windows-latest
            node-version: 24.x
    runs-on: ${{ matrix.os }}
    env:
      cache_playwright_path: ${{ matrix.os == 'macos-latest' && '~/Library/Caches/ms-playwright' || matrix.os == 'windows-latest' && 'C:\Users\runneradmin\AppData\Local\ms-playwright' || '~/.cache/ms-playwright' }}
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore playwright from cache
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ${{ env.cache_playwright_path }}
          key: playwright-v2-${{ matrix.node-version }}-${{ runner.os }}-${{ runner.arch }}-v${{ secrets.CACHE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install playwright
        run: |
          pnpm exec playwright install
          pnpm exec playwright install --list
      - name: Save playwright to cache
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.cache_playwright_path }}
          key: ${{ steps.playwright-cache.outputs.cache-primary-key }}

  mac-rich:
    needs: setup-playwright
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['webkit', 'chromium', 'firefox']
        editor-mode: ['rich-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'macos-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  mac-plain:
    needs: setup-playwright
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['webkit']
        editor-mode: ['plain-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'macos-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  linux:
    needs: setup-playwright
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
        editor-mode: ['rich-text', 'plain-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'ubuntu-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  windows:
    needs: setup-playwright
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
        editor-mode: ['rich-text', 'plain-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'windows-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  collab-mac:
    needs: setup-playwright
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['webkit']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'macos-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: 'rich-text-with-collab'

  collab-linux:
    needs: setup-playwright
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'ubuntu-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: 'rich-text-with-collab'

  collab-windows:
    needs: setup-playwright
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'windows-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: 'rich-text-with-collab'

  prod:
    needs: setup-playwright
    strategy:
      matrix:
        os: ['ubuntu-latest']
        node-version: [24.x]
        browser: ['chromium']
        editor-mode: ['rich-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      prod: true
      os: ${{ matrix.os }}
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  collab-prod:
    needs: setup-playwright
    strategy:
      matrix:
        os: ['ubuntu-latest']
        node-version: [24.x]
        browser: ['chromium']
        editor-mode: ['rich-text-with-collab']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      prod: true
      os: ${{ matrix.os }}
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  # This has been stalling in GitHub CI for unknown reasons, disable for now
  # react-beta:
  #   strategy:
  #     matrix:
  #       # Currently using a single combination for every-patch e2e tests of
  #       # react beta to reduce cost impact
  #       editor-mode: ['rich-text']
  #       prod: [false]
  #   uses: ./.github/workflows/call-e2e-test.yml
  #   with:
  #     os: 'ubuntu-latest'
  #     browser: 'chromium'
  #     node-version: 24.x
  #     editor-mode: ${{ matrix.editor-mode }}
  #     prod: ${{ matrix.prod }}
  #     override-react-version: beta

  flaky:
    needs: setup-playwright
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
        editor-mode: ['rich-text', 'plain-text', 'rich-text-with-collab']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'ubuntu-latest'
      flaky: true
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}
