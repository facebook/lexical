name: Lexical e2e canary test

on:
  workflow_call:

permissions: {}

jobs:
  canary:
    strategy:
      matrix:
        os: ['ubuntu-latest']
        node-version: [24.x]
        browser: ['chromium']
        editor-mode: ['rich-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: ${{ matrix.os }}
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}
