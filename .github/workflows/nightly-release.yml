name: Nightly Release Branch
on:
  # Run daily at 2:30am UTC, Monday-Friday
  schedule:
    - cron: '30 2 * * 1-5'
  workflow_dispatch:
    inputs:
      use-trusted-publishing:
        description: Ignore the NPM_TOKEN secret and force npm trusted publishing (OIDC). Use to verify the trusted-publishing setup without removing the repo secret.
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    # prevents this action from running on forks
    if: github.repository_owner == 'facebook'
    uses: ./.github/workflows/call-release.yml
    with:
      increment-version: true
      publish: true
      increment: prerelease
      channel: nightly
      ignore-previously-published: true
      use-trusted-publishing: ${{ inputs.use-trusted-publishing || false }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
