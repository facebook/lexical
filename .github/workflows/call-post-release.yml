name: (call) Post-release branch with updated examples
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'git ref (main)'
        required: true
        type: string
        default: main
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
        default: main
jobs:
  post-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - id: latest
        uses: ./.github/actions/get-latest-release
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: 24.x
          pnpm-install-args: ''
      - run: |
          pnpm run update-examples
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Update examples for ${{ steps.latest.outputs.release }}'
          commit_user_name: 'Lexical GitHub Actions Bot'
          branch: post-release-${{ steps.latest.outputs.release }}
          create_branch: true
          push_options: '--force'
