name: Lexical Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'examples/**'
      - 'packages/lexical-website/**'
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

permissions: {}

concurrency:
  # Only cancel an in-progress run when a newer commit lands on the same ref.
  # Other events (labeled, reopened, manual approval re-runs, etc.) get a
  # distinct group so they never cancel a run that is already underway.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'pull_request' && github.event.action != 'synchronize' && github.run_id || 'commit' }}
  cancel-in-progress: true

jobs:
  core-tests:
    uses: ./.github/workflows/call-core-tests.yml

  e2e-tests:
    if: github.repository_owner == 'facebook'
    uses: ./.github/workflows/call-e2e-canary-tests.yml

  # Checks that every dependency pinned in pnpm-lock.yaml is available from the
  # registry before it can break a build. Mark this job's merge_group run
  # REQUIRED to gate landing; fork PRs are skipped (the required merge_group run
  # enforces them).
  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/internal-registry/dependency-check
