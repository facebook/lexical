name: Lexical Core Tests

on:
  workflow_call:

permissions: {}

jobs:
  integrity:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    env:
      CI: true
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}
      - run: pnpm run ci-check
      - run: pnpm run build
      - run: pnpm run build-www
      - run: pnpm run --filter @lexical/website build
      - run: pnpm run --filter lexical-playground build-vercel

  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    env:
      CI: true
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}
      - run: pnpm run test-unit

  # Default browser-mode run: linux + chromium only. The extended suite
  # (tests-extended.yml) fans these out across more browsers and operating
  # systems.
  browser:
    uses: ./.github/workflows/call-browser-tests.yml
    with:
      os: 'ubuntu-latest'
      node-version: '24.x'
      browser: 'chromium'
