name: Lexical e2e tests

on:
  workflow_call:

permissions: {}

jobs:
  # Build the dev playground once and cache the output for all test jobs
  build:
    strategy:
      matrix:
        node-version: [24.x]
        prod: [true, false]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}
      - uses: ./.github/actions/setup-playground
        with:
          node-version: ${{ matrix.node-version }}
          prod: ${{ matrix.prod }}

  # Prime playwright browser caches once per OS so parallel test jobs
  # don't all download browsers simultaneously
  setup-playwright:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 24.x
          - os: macos-latest
            node-version: 24.x
          - os: windows-latest
            node-version: 24.x
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - uses: ./.github/actions/setup-playwright
        with:
          node-version: ${{ matrix.node-version }}

  mac-rich:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['webkit', 'chromium', 'firefox']
        editor-mode: ['rich-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'macos-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  mac-plain:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['webkit']
        editor-mode: ['plain-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'macos-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  linux:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
        editor-mode: ['rich-text', 'plain-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'ubuntu-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  windows:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
        editor-mode: ['rich-text', 'plain-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'windows-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  collab-mac:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['webkit']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'macos-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: 'rich-text-with-collab'

  collab-linux:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'ubuntu-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: 'rich-text-with-collab'

  collab-windows:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'windows-latest'
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: 'rich-text-with-collab'

  prod:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        os: ['ubuntu-latest']
        node-version: [24.x]
        browser: ['chromium']
        editor-mode: ['rich-text']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      prod: true
      os: ${{ matrix.os }}
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}

  collab-prod:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        os: ['ubuntu-latest']
        node-version: [24.x]
        browser: ['chromium']
        editor-mode: ['rich-text-with-collab']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      prod: true
      os: ${{ matrix.os }}
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}
  flaky:
    needs: [build, setup-playwright]
    strategy:
      matrix:
        node-version: [24.x]
        browser: ['chromium', 'firefox']
        editor-mode: ['rich-text', 'plain-text', 'rich-text-with-collab']
    uses: ./.github/workflows/call-e2e-test.yml
    with:
      os: 'ubuntu-latest'
      flaky: true
      node-version: ${{ matrix.node-version }}
      browser: ${{ matrix.browser }}
      editor-mode: ${{ matrix.editor-mode }}
