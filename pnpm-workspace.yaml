packages:
  - 'packages/*'
  - 'dev-examples/*'
  - '!examples/**/*'
  - '!scripts/__tests__/integration/fixtures/**/*'

minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - '@lexical/*'
  - 'lexical'

catalog:
  yjs: '^13.6.31'

overrides:
  react: '19.2.5'
  react-dom: '19.2.5'
  '@types/node': '25.9.1'
  postcss: '8.5.15'
  prettier: '3.8.1'
  'yaml@^1': '^1.10.3'
  uuid: '>=14.0.0'
  webpack-dev-server: '>=5.2.4'
  onnxruntime-node: 'link:./stubs/empty'
  sharp: 'link:./stubs/empty'
  yjs: 'catalog:'
  tmp: '>=0.2.6'

peerDependencyRules:
  allowedVersions:
    eslint: '10'

# Build scripts stay disabled — matches pre-migration (pnpm 10) behavior where
# no dependency build scripts were approved and CI passed on prebuilt binaries.
allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  core-js: false
  esbuild: false
  leveldown: false
  protobufjs: false
  spawn-sync: false
  unrs-resolver: false
