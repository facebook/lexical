name: Lexical Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'examples/**'
      - 'packages/lexical-website/**'
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

permissions: {}

concurrency:
  # Only cancel an in-progress run when a newer commit lands on the same ref.
  # Other events (labeled, reopened, manual approval re-runs, etc.) get a
  # distinct group so they never cancel a run that is already underway.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.event_name == 'pull_request' && github.event.action != 'synchronize' && github.run_id || 'commit' }}
  cancel-in-progress: true

jobs:
  core-tests:
    uses: ./.github/workflows/call-core-tests.yml

  e2e-tests:
    if: github.repository_owner == 'facebook'
    uses: ./.github/workflows/call-e2e-canary-tests.yml

  # Assert every third-party dependency pinned in pnpm-lock.yaml is fetchable
  # from Meta's internal npm registry. Newly published versions are withheld
  # there for a short window, so a frozen install inside Meta can fail on a
  # just-published version even though it installs fine from public npm. Mark
  # this job's merge_group run REQUIRED so it blocks landing; fork PRs can't mint
  # the registry identity and pass with a notice (the required merge-queue run
  # enforces them).
  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/internal-registry/dependency-check
